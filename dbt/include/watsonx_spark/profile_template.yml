fixed:
  type: watsonx_spark
  method: http
  auth:
    instance: "<watsonx.data-instance>"
    user: "<watsonx.data-username>"
    apikey: "<watsonx.data-apikey>"
  # create_schemas: true         # Optional: Set to false to disable automatic schema creation (default: true)
  # auto_location: true          # Optional: Set to false to disable automatic LOCATION clause in CREATE TABLE (default: true)
  # suppress_ssl_warnings: true  # Optional: Set to false to show SSL warnings when verify=False (default: true)
prompts:
  host:
    hint: us-south.lakehouse.cloud.ibm.com
  uri:
    hint: /lakehouse/api/v2/spark_engines/<engine-id</sql_servers/<sql-server-id>/connect/cliservice
  schema:
    hint: default schema that DBT will run on
  catalog:
    hint: default catalog that DBT will run on